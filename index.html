<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portal Wali Santri - Attauhidiyyah</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body>

    <div class="app-container">
        
        <!-- HALAMAN LOGIN -->
        <div id="login-page" class="page-wrapper">
            <header class="login-header">
                <div class="logo-area">✨</div>
                <h1>Portal Wali Santri</h1>
                <p>Silakan masuk menggunakan Nomor Induk Santri untuk melihat perkembangan buah hati Anda.</p>
            </header>

            <main class="login-body">
                <div class="form-group">
                    <label for="nis-input">Nomor Induk Santri (NIS)</label>
                    <input type="number" id="nis-input" placeholder="Masukkan NIS santri..." inputmode="numeric">
                </div>
                <button id="btn-login" onclick="prosesLogin()">Masuk Ke Dashboard</button>
                <div id="login-error" class="error-text"></div>
            </main>
            
            <footer class="login-footer">
                <p>Kelas 3 Ibtida B • Madrasah Attauhidiyyah</p>
            </footer>
        </div>

        <!-- HALAMAN DASHBOARD UTAMA (TERSEMBUNYI DI AWAL) -->
        <div id="dashboard-page" class="page-wrapper" style="display: none;">
            <header class="main-header">
                <div class="header-top">
                    <div class="badge-status">Akses Premium</div>
                    <button class="btn-logout" onclick="logout()">Keluar</button>
                </div>
                <div class="user-profile">
                    <div class="avatar">👤</div>
                    <div class="profile-text">
                        <span>Wali Santri dari</span>
                        <h2 id="nama-santri">Nama Santri</h2>
                    </div>
                </div>
            </header>

            <main class="dashboard-body">
                <h3 class="section-title">Laporan & Informasi Santri</h3>
                <!-- Tempat data dari Google Sheets akan dipecah secara premium -->
                <div id="detail-data-container"></div>
            </main>
        </div>

    </div>

    <!-- Efek Loading Overlay -->
    <div id="loading-overlay" class="overlay" style="display: none;">
        <div class="spinner"></div>
        <p>Memverifikasi data...</p>
    </div>

    <script>
        // PENTING: Ganti dengan URL Web App Google Apps Script Anda!
        const webAppUrl = "https://script.google.com/macros/s/AKfycbwkUDsPmPfBv-Kswj9MmxTG_4I64Lv7oO9i8j7a-jFwNRaTwUOc6wOpYg_RltZT29j-/exec";

        // Pastikan nama kolom NIS di Google Sheets Anda ditulis "NIS" (Huruf besar semua)
        async function prosesLogin() {
            const nisInput = document.getElementById('nis-input').value.trim();
            const errorDiv = document.getElementById('login-error');
            const loading = document.getElementById('loading-overlay');

            if (!nisInput) {
                errorDiv.innerText = "Mohon masukkan nomor NIS terlebih dahulu.";
                return;
            }

            errorDiv.innerText = "";
            loading.style.display = "flex";

            try {
                const response = await fetch(webAppUrl);
                const data = await response.json();
                
                // Cari data santri berdasarkan NIS
                const santriDitemukan = data.find(item => item.NIS == nisInput || item.nis == nisInput);

                if (santriDitemukan) {
                    // Jika NIS cocok, tampilkan halaman dashboard
                    document.getElementById('login-page').style.display = 'none';
                    document.getElementById('dashboard-page').style.display = 'flex';
                    
                    // Set nama santri di header
                    document.getElementById('nama-santri').innerText = santriDitemukan['Nama'] || santriDitemukan['NAMA'] || 'Santri';

                    // Pecah data lainnya ke dalam komponen mewah
                    const container = document.getElementById('detail-data-container');
                    container.innerHTML = '';

                    for (const key in santriDitemukan) {
                        // Jangan tampilkan NIS dan Nama lagi di dalam list detail bawah
                        if (key.toLowerCase() !== 'nis' && key.toLowerCase() !== 'nama') {
                            const row = document.createElement('div');
                            row.className = 'premium-card-row';
                            row.innerHTML = `
                                <div class="card-icon">📊</div>
                                <div class="card-info-text">
                                    <span class="label-title">${key}</span>
                                    <span class="value-content">${santriDitemukan[key]}</span>
                                </div>
                            `;
                            container.appendChild(row);
                        }
                    }
                } else {
                    errorDiv.innerText = "Nomor NIS tidak ditemukan. Silakan periksa kembali atau hubungi pengurus.";
                }
            } catch (error) {
                console.error(error);
                errorDiv.innerText = "Terjadi gangguan koneksi. Silakan coba lagi.";
            } finally {
                loading.style.display = "none";
            }
        }

        function logout() {
            document.getElementById('nis-input').value = '';
            document.getElementById('dashboard-page').style.display = 'none';
            document.getElementById('login-page').style.display = 'flex';
        }
    </script>
</body>
</html>
